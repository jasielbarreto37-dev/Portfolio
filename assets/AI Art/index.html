<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail | Jasiel Barreto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  
  <style>
    /* ===== VARIABLES & BASE (Mismos colores que la Principal) ===== */
    :root {
      --bg-color: #1E1E1E;
      --accent-color: #CC9F33;
      --card-bg: #363636;
      --text-main: #E0E0E0;
      --text-muted: #A0A0A0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 0 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 0 80px 0;
    }

    /* ===== NAVIGATION ===== */
    .back-nav {
      margin-bottom: 40px;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .back-link:hover {
      color: var(--accent-color);
    }

    /* ===== PROJECT HEADER ===== */
    .project-header {
      margin-bottom: 40px;
    }

    .project-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
    }

    .project-title span {
      color: var(--accent-color);
    }

    /* ===== GALLERY GRID ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* Enlace contenedor que abre la imagen en grande nativamente */
    .gallery-item {
      background-color: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid transparent;
      transition: transform 0.2s ease, border-color 0.2s ease;
      display: block;
      cursor: zoom-in;
    }

    .gallery-item:hover {
      transform: translateY(-3px);
      border-color: var(--accent-color);
    }

    .gallery-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .project-title { font-size: 2rem; }
      .gallery-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Botón para regresar a la principal relativamente -->
    <nav class="back-nav">
      <a href="../../index.html" class="back-link">← Back to Portfolio</a>
    </nav>

    <!-- Encabezado del Proyecto -->
    <header class="project-header">
      <!-- Cambia este título por el del proyecto correspondiente -->
      <h1 class="project-title">Project: <span>AI Art</span></h1>
    </header>

    <!-- Galería de Imágenes -->
    <main class="gallery-grid">
      
      <!-- IMAGEN 1 -->
      <!-- El 'href' apunta directamente al archivo para que el navegador lo abra completo al dar click -->
      <a href="ComfyUI_00207_.png" target="_blank" class="gallery-item">
        <img src="ComfyUI_00207_.png" alt="Project detail" class="gallery-img">
      </a>

      <!-- IMAGEN 2 -->
      <a href="ComfyUI_00216_.png" target="_blank" class="gallery-item">
        <img src="ComfyUI_00216_.png" alt="Project detail" class="gallery-img">
      </a>

      <!-- IMAGEN 3 -->
      <a href="ComfyUI_00232_.png" target="_blank" class="gallery-item">
        <img src="ComfyUI_00232_.png" alt="Project detail" class="gallery-img">
      </a>

       <a href="ComfyUI_00300_.png" target="_blank" class="gallery-item">
        <img src="ComfyUI_00300_.png" alt="Project detail" class="gallery-img">
      </a>

       <a href="ComfyUI_00305_.png" target="_blank" class="gallery-item">
        <img src="ComfyUI_00305_.png" alt="Project detail" class="gallery-img">
      </a>

       <a href="Mock Up Luna Pop Decor Montaje Horizontal.png" target="_blank" class="gallery-item">
        <img src="Mock Up Luna Pop Decor Montaje Horizontal.png" alt="Project detail" class="gallery-img">
      </a>

       <a href="Mock Up Luna Pop Decor Montaje Vertical.png" target="_blank" class="gallery-item">
        <img src="Mock Up Luna Pop Decor Montaje Vertical.png" alt="Project detail" class="gallery-img">
      </a>

       <a href="portada.png" target="_blank" class="gallery-item">
        <img src="portada.png" alt="Project detail" class="gallery-img">
      </a>

      <!-- Puedes seguir duplicando este bloque para añadir tantas imágenes como tenga la carpeta -->

    </main>

  </div>

</body>
</html>
